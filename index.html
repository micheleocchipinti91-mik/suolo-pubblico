<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!-- Viewport: no-zoom su iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- PWA / iPad meta tag obbligatori -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Suolo Pubblico">
  <meta name="theme-color" content="#1a365d">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="./logo.png">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">

  <title>Gestione Suolo Pubblico - ATM Spa</title>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <!-- Hamburger per mobile/iPad portrait -->
      <button id="sidebarToggle" class="btn btn-link text-white d-lg-none me-2" style="font-size:1.4rem;">
        <i class="bi bi-list"></i>
      </button>
      <a class="navbar-brand d-flex align-items-center" href="#" onclick="navigate('/'); return false;">
        <img src="./logo.png" alt="Logo ATM Spa">
        <span>Gestione Suolo Pubblico - ATM Spa</span>
      </a>
      <!-- Azioni navbar destra -->
      <div class="ms-auto d-flex align-items-center gap-2">
        <!-- Backup/Ripristino -->
        <div class="dropdown">
          <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
            <i class="bi bi-cloud-arrow-up"></i>
            <span class="d-none d-md-inline"> Dati</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="esportaDati(); return false;">
              <i class="bi bi-download me-2"></i>Esporta backup JSON
            </a></li>
            <li><a class="dropdown-item" href="#" onclick="el('importFileInput').click(); return false;">
              <i class="bi bi-upload me-2"></i>Importa backup JSON
            </a></li>
          </ul>
        </div>
        <input type="file" id="importFileInput" accept=".json" style="display:none;">
      </div>
    </div>
  </nav>

  <!-- Overlay per chiudere sidebar su mobile -->
  <div id="sidebar-overlay"></div>

  <!-- ── LAYOUT ── -->
  <div class="container-fluid">
    <div class="row">

      <!-- ── SIDEBAR ── -->
      <nav id="sidebar" class="col-md-2 sidebar py-3">
        <div class="nav flex-column">
          <a class="nav-link" href="#" data-route="/" onclick="navigate('/'); return false;">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
          <a class="nav-link" href="#" data-route="/occupazione" onclick="navigate('/occupazione'); return false;">
            <i class="bi bi-calendar3 me-2"></i>Occupazione Suolo
          </a>
          <a class="nav-link" href="#" data-route="/riepilogo" onclick="navigate('/riepilogo'); return false;">
            <i class="bi bi-table me-2"></i>Riepilogo
          </a>
          <a class="nav-link" href="#" data-route="/anagrafica" onclick="navigate('/anagrafica'); return false;">
            <i class="bi bi-building me-2"></i>Anagrafica
          </a>
        </div>
      </nav>

      <!-- ── CONTENUTO PRINCIPALE ── -->
      <main id="main-content" class="col-md-10 ms-sm-auto px-4 py-4">
        <!-- Le viste vengono iniettate qui da app.js -->
        <div class="text-center py-5 text-muted">
          <div class="spinner-border" role="status"></div>
          <p class="mt-3">Caricamento...</p>
        </div>
      </main>

    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Banner installa PWA (mostrato su Safari se non installata) -->
  <div id="install-banner">
    <i class="bi bi-share me-2"></i>
    Per installare l'app: tocca <strong>Condividi</strong> → <strong>Aggiungi a schermata Home</strong>
    <button class="btn btn-sm btn-link text-white ms-2" onclick="el('install-banner').classList.remove('show')">✕</button>
  </div>

  <!-- ── SCRIPTS ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jsPDF + autoTable per export PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- App modules -->
  <script src="./db.js"></script>
  <script src="./pdf.js"></script>
  <script src="./app.js"></script>

  <script>
    // Mostra banner "Aggiungi a schermata Home" solo su Safari iOS/iPadOS
    // se l'app NON è già installata come PWA standalone
    window.addEventListener('load', () => {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone) {
        setTimeout(() => {
          document.getElementById('install-banner').classList.add('show');
        }, 3000);
      }
    });
  </script>

</body>
</html>
